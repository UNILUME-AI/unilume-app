name: Claude Code

# 仅在评论/Issue 中 @claude 时触发（不自动跑每个 PR，避免烧订阅额度）
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # 过滤：评论/Issue 正文里 @claude 才触发。
    # 触发者授权由 claude-code-action 内置校验把关——仅有仓库【写权限】者能真正跑起来；
    # 无写权限者的 @claude 会起 runner 但 action 立即退出（public 仓库 runner 免费、不烧额度）。
    # 不要加回 author_association 闸：private org 成员在 webhook 载荷里会被显示成 NONE 而被误挡。
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write        # 读写仓库文件、推送分支
      pull-requests: write   # 创建 PR、评论
      issues: write          # 回复 Issue
      id-token: write        # OIDC（action 内部认证用）
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # 订阅授权（Pro/Max）：本地 `claude setup-token` 生成后存到仓库 Secrets
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 默认 Sonnet。要用 Opus（更强但更费额度）就取消下一行注释：
          # claude_args: "--model claude-opus-4-8 --max-turns 15"
